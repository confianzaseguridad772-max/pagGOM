<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOM | Quantum Universe HUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Share+Tech+Mono&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --holo-cyan: #00f0ff;
            --holo-magenta: #ff007f;
            --holo-orange: #ffaa00;
            --holo-green: #39ff14;
            --holo-glow: rgba(0, 240, 255, 0.2);
            --font-hud: 'Share Tech Mono', monospace;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            /* Fondo del espacio con nebulosa cósmica profunda */
            background: 
                linear-gradient(rgba(0, 240, 255, 0.03) 50%, rgba(0, 0, 0, 0.4) 50%),
                radial-gradient(circle at 50% 50%, #0d162d 0%, #020613 100%);
            background-size: 100% 4px, 100% 100%;
            font-family: 'Poppins', sans-serif; 
            color: #e2e8f0; 
            min-height: 100vh; 
            padding-bottom: 120px;
            overflow-x: hidden;
            position: relative;
        }

        /* CIELO DEL UNIVERSO - Nebulosa y Estrellas en movimiento de fondo */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(rgba(255, 0, 127, 0.1), transparent 400px);
            background-size: 550px 550px, 350px 350px, 100% 100%;
            background-position: 0 0, 40px 60px, center;
            animation: spaceShift 120s linear infinite;
            z-index: -1;
            opacity: 0.6;
        }

        /* CONTENEDOR EXPANDIDO A TODA LA PANTALLA */
        .fullscreen-hud { 
            width: 100%; 
            max-width: 100%; /* Rompe el límite anterior */
            padding: 24px; 
        }

        /* --- INTERFAZ HOLOGRÁFICA HEADER (CONSOLA SUPERIOR) --- */
        .hud-header { 
            background: rgba(4, 10, 26, 0.4); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-bottom: 3px double var(--holo-cyan);
            padding: 16px 24px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 30px; 
            position: relative;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.1), inset 0 0 20px rgba(0, 240, 255, 0.05);
        }
        
        .hud-header::before { 
            content: 'DEEP_SPACE_DEVICES // LINK_STABLE'; 
            position: absolute; bottom: -20px; left: 24px; 
            font-family: var(--font-hud); font-size: 0.6rem; color: var(--holo-cyan); letter-spacing: 2px; opacity: 0.8; 
        }

        .profile { display: flex; align-items: center; gap: 16px; }

        .avatar-ring { 
            width: 64px; height: 64px; border-radius: 50%; padding: 2px; 
            background: linear-gradient(135deg, var(--holo-cyan), transparent);
            border: 1px solid var(--holo-cyan);
            box-shadow: 0 0 15px var(--holo-cyan);
        }
        
        .avatar-box { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; background: #000; cursor: pointer; }
        #avatar-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(1.2) contrast(1.1); }
        
        .title-box h1 { 
            font-family: 'Orbitron', sans-serif; font-size: 1.3rem; font-weight: 900; letter-spacing: 3px;
            color: #fff; text-shadow: 0 0 15px var(--holo-cyan), 0 0 5px #fff;
        }
        
        .title-box p { 
            font-size: 0.65rem; color: var(--holo-green); font-family: var(--font-hud); letter-spacing: 2px; margin-top: 2px;
            display: flex; align-items: center; gap: 6px;
        }
        .title-box p::before { content: ''; width: 6px; height: 6px; background: var(--holo-green); border-radius: 50%; display: inline-block; animation: pulseBeacon 1s infinite alternate; box-shadow: 0 0 10px var(--holo-green); }

        /* --- TELEMETRÍA TÁCTICA EXPANDIDA (SELECTOR DE CATEGORÍAS EN TODA LA PANTALLA) --- */
        .telemetry-scroller {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding: 10px 4px 20px 4px;
            margin-bottom: 30px;
            scrollbar-width: none;
        }
        .telemetry-scroller::-webkit-scrollbar { display: none; }

        .holo-node {
            flex: 0 0 160px;
            background: rgba(4, 11, 28, 0.35);
            border: 1px solid rgba(0, 240, 255, 0.15);
            padding: 16px 14px;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            backdrop-filter: blur(5px);
            transition: all 0.3s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .holo-node .node-meta {
            font-family: var(--font-hud); font-size: 0.6rem; color: rgba(0, 240, 255, 0.4);
            display: flex; justify-content: space-between; margin-bottom: 10px;
        }

        .holo-node i {
            font-size: 1.4rem; color: rgba(255, 255, 255, 0.4); margin-bottom: 12px; display: block; transition: all 0.3s;
        }

        .holo-node span {
            font-family: 'Orbitron', sans-serif; font-size: 0.75rem; font-weight: 700; color: #94a3b8; display: block;
            text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; letter-spacing: 1px;
        }

        /* Línea de escaneo láser inferior */
        .holo-node .laser-line {
            width: 100%; height: 2px; background: rgba(255,255,255,0.02); margin-top: 12px; position: relative; overflow: hidden;
        }
        .holo-node .laser-line::after { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 25%; background: rgba(0,240,255,0.2); transition: all 0.3s; }

        /* NODO ACTIVO HOLOGRÁFICO CON LUZ INTENSA */
        .holo-node.node-active {
            background: rgba(0, 240, 255, 0.08);
            border-color: var(--holo-cyan);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.25), inset 0 0 15px rgba(0, 240, 255, 0.15);
            transform: translateY(-4px);
        }
        .holo-node.node-active .node-meta { color: var(--holo-cyan); }
        .holo-node.node-active i { color: var(--holo-cyan); text-shadow: 0 0 15px var(--holo-cyan); }
        .holo-node.node-active span { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .holo-node.node-active .laser-line::after { width: 100%; background: var(--holo-cyan); box-shadow: 0 0 10px var(--holo-cyan); }

        /* Variación cromática para look del espacio dinámico y colorido */
        .holo-node.node-active:nth-child(2n) { border-color: var(--holo-magenta); background: rgba(255, 0, 127, 0.06); box-shadow: 0 0 25px rgba(255, 0, 127, 0.25); }
        .holo-node.node-active:nth-child(2n) .node-meta { color: var(--holo-magenta); }
        .holo-node.node-active:nth-child(2n) i { color: var(--holo-magenta); text-shadow: 0 0 15px var(--holo-magenta); }
        .holo-node.node-active:nth-child(2n) .laser-line::after { background: var(--holo-magenta); box-shadow: 0 0 10px var(--holo-magenta); }

        .holo-node.node-active:nth-child(3n) { border-color: var(--holo-orange); background: rgba(255, 170, 0, 0.06); box-shadow: 0 0 25px rgba(255, 170, 0, 0.25); }
        .holo-node.node-active:nth-child(3n) .node-meta { color: var(--holo-orange); }
        .holo-node.node-active:nth-child(3n) i { color: var(--holo-orange); text-shadow: 0 0 15px var(--holo-orange); }
        .holo-node.node-active:nth-child(3n) .laser-line::after { background: var(--holo-orange); box-shadow: 0 0 10px var(--holo-orange); }

        /* --- REJILLA INTELIGENTE DE PANTALLA COMPLETA --- */
        .hud-grid-display {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); /* Súper adaptativo en Celulares y PC */
            gap: 20px;
            transition: opacity 0.25s ease;
        }

        /* Botón / Módulo Holográfico */
        .holo-card { 
            background: rgba(4, 9, 23, 0.3);
            border: 1px solid rgba(0, 240, 255, 0.1);
            border-top: 3px solid var(--holo-cyan);
            border-radius: 12px;
            padding: 24px 16px; 
            text-align: center; 
            position: relative; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* Luz cuántica indicadora */
        .holo-card::before {
            content: ''; position: absolute; top: 8px; left: 10px; width: 6px; height: 6px; 
            background: var(--holo-green); border-radius: 50%; box-shadow: 0 0 8px var(--holo-green);
        }

        .holo-card:nth-child(2n) { border-top-color: var(--holo-magenta); }
        .holo-card:nth-child(3n) { border-top-color: var(--holo-orange); }
        
        .holo-card:hover {
            background: rgba(0, 240, 255, 0.05);
            border-color: var(--holo-cyan);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.25), inset 0 0 15px rgba(0, 240, 255, 0.05);
            transform: scale(1.04) translateY(-3px);
        }
        
        .holo-card:active { transform: scale(0.97); }
        .holo-card a { text-decoration: none; color: white; display: block; }
        
        .holo-card i.main-icon { 
            font-size: 2rem; margin-bottom: 14px; color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            transition: transform 0.3s;
        }
        .holo-card:hover i.main-icon { transform: translateY(-3px); color: var(--holo-cyan); text-shadow: 0 0 20px var(--holo-cyan); }
        
        .holo-card span { 
            font-family: var(--font-hud); font-size: 0.95rem; font-weight: bold; color: #94a3b8; display: block; 
            letter-spacing: 1px; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .holo-card:hover span { color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.6); }

        /* Purgado de datos */
        .card-actions { position: absolute; bottom: 8px; right: 10px; opacity: 0; transition: opacity 0.2s; z-index: 5;}
        .holo-card:hover .card-actions { opacity: 1; }
        .action-btn { 
            background: rgba(255, 0, 127, 0.1); border: 1px solid var(--holo-magenta); 
            color: var(--holo-magenta); width: 24px; height: 24px; border-radius: 4px; cursor: pointer; 
            font-size: 0.65rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .action-btn:hover { background: var(--holo-magenta); color: white; box-shadow: 0 0 10px var(--holo-magenta); }

        /* --- PANEL FLOTANTE DE REGISTRO (FAB) --- */
        .fab { 
            position: fixed; bottom: 35px; right: 35px; width: 60px; height: 60px; 
            background: rgba(4, 10, 26, 0.8); border: 1px solid var(--holo-cyan);
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            color: var(--holo-cyan); font-size: 1.4rem; cursor: pointer; z-index: 1000; 
            box-shadow: 0 0 25px rgba(0,240,255,0.4), inset 0 0 10px rgba(0,240,255,0.2); 
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .fab:hover { 
            background: var(--holo-cyan); color: #000;
            box-shadow: 0 0 35px var(--holo-cyan); transform: scale(1.1) rotate(90deg);
        }

        /* --- TERMINAL DE CONFIGURACIÓN MODAL --- */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(2, 5, 15, 0.93); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 2000; 
            justify-content: center; align-items: center; padding: 20px; 
        }
        .modal-content { 
            background: rgba(5, 12, 30, 0.85); width: 100%; max-width: 420px; padding: 30px; border-radius: 16px; 
            border: 1px solid var(--holo-magenta); box-shadow: 0 0 40px rgba(255, 0, 127, 0.3); 
            position: relative; backdrop-filter: blur(10px);
        }
        
        input, select { 
            width: 100%; padding: 14px; margin-bottom: 14px; background: rgba(12, 22, 48, 0.7); 
            border: 1px solid rgba(0, 240, 255, 0.2); border-radius: 6px; color: white; 
            font-family: var(--font-hud); font-size: 0.9rem; outline: none; transition: all 0.3s;
        }
        input:focus, select:focus { border-color: var(--holo-magenta); background: rgba(16, 31, 68, 0.8); box-shadow: 0 0 15px rgba(255, 0, 127, 0.25); }
        select option { background: #050c1e; color: #fff; }

        .save-btn { 
            background: linear-gradient(90deg, var(--holo-magenta), var(--holo-orange)); color: white; 
            font-weight: 900; border: none; padding: 16px; border-radius: 6px; width: 100%; 
            cursor: pointer; font-family: 'Orbitron'; font-size: 0.85rem; letter-spacing: 1.5px; transition: all 0.3s;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.3);
        }
        .save-btn:hover { filter: brightness(1.1); box-shadow: 0 0 30px rgba(255, 0, 127, 0.5); }

        /* Animaciones */
        @keyframes spaceShift { from { background-position: 0 0, 40px 60px, center; } to { background-position: 550px 1100px, 390px 610px, center; } }
        @keyframes pulseBeacon { from { opacity: 0.3; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="fullscreen-hud">
    <header class="hud-header">
        <div class="profile">
            <div class="avatar-ring">
                <div class="avatar-box" onmouseenter="playAvatarSound()" onmouseleave="stopAvatarSound()">
                    <video id="avatar-video" loop muted playsinline autoplay>
                        <source src="avatar.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
            <div class="title-box">
                <h1>GOM QUANTUM DISCOVERY</h1>
                <p>UNIVERSAL_DATA_STREAMING</p>
            </div>
        </div>
        <i class="fas fa-satellite" style="color: var(--holo-cyan); font-size: 1.2rem; text-shadow: 0 0 12px var(--holo-cyan); animation: pulseBeacon 1s infinite alternate;"></i>
    </header>

    <div class="telemetry-scroller" id="telemetry-bar"></div>

    <div id="loading" style="text-align: center; padding: 40px; color: var(--holo-cyan); font-family: var(--font-hud); font-size: 0.85rem; letter-spacing: 3px;">
        <i class="fas fa-project-diagram fa-spin" style="margin-right: 8px;"></i> DESTRABANDO COORDENADAS GALÁCTICAS...
    </div>
    
    <div class="hud-grid-display" id="cards-view"></div>
</div>

<button class="fab" onclick="toggleModal()"><i class="fas fa-atom"></i></button>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <h2 style="font-family:'Orbitron'; font-size:1rem; font-weight:900; letter-spacing:1px; text-align:center; margin-bottom:20px; color:var(--holo-magenta); text-shadow:0 0 10px rgba(255,0,127,0.4);">AÑADIR VECTOR HOLOGRÁFICO</h2>
        <input type="text" id="siteName" placeholder="IDENTIFICADOR PLANETARIO (NOMBRE)">
        <input type="text" id="siteUrl" placeholder="VECTOR DE ENLACE (URL)">
        <input type="text" id="siteCat" placeholder="CONSTELACIÓN DESTINO (CATEGORÍA)">
        
        <select id="siteIcon">
            <option value="fa-users">👥 Grupos</option>
            <option value="fa-child">🧒 Niño</option>
            <option value="fa-heart-pulse">❤️ Salud</option>
            <option value="fa-church">⛪ Iglesia</option>
            <option value="fa-microscope">🔬 Investigación</option>
            <option value="fa-seedling">🌱 Desarrollo Infantil</option>
            <option value="fa-brain">🧠 Inteligencia Artificial</option>
            <option value="fa-video">🎥 Videos</option>
            <option value="fa-flask-vial">🧪 Laboratorio</option>
            <option value="fa-database">📊 Gestión de Datos</option>
            <option value="fa-briefcase-medical">🏥 Gestión Pública</option>
            <option value="fa-book-open-reader">📚 Biblioteca Digital</option>
            <option value="fa-car">🚗 Mantenimiento Vehicular</option>
            <option value="fa-globe">🌐 Recurso Web</option>
            <option value="fa-shield-halved">🛡️ Seguridad</option>
            <option value="fa-file-lines">📄 Documentos</option>
            <option value="fa-calendar-check">📅 Agenda</option>
            <option value="fa-laptop-code">💻 Desarrollo Web</option>
            <option value="fa-chart-pie">📈 Estadísticas</option>
        </select>

        <button id="btnSave" class="save-btn" onclick="saveToExcel()">SINC_VECTOR_MEM</button>
        <button onclick="toggleModal()" style="background:transparent; color:#64748b; width:100%; margin-top:14px; border:none; cursor:pointer; font-family: var(--font-hud); font-size:0.75rem;">CANCELAR ALINEACIÓN</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwdIVWOn-VY6mhSrpIA7SolVLZ-1CjaRAWM8rkWsjOsmiDt1I6b8n6u0slz4bz7wdYcKg/exec";
    const video = document.getElementById('avatar-video');
    
    let globalData = [];
    let categories = [];
    let activeIndex = 0;

    function playAvatarSound() { video.muted = false; video.currentTime = 0; video.play().catch(e => {}); }
    function stopAvatarSound() { video.muted = true; }

    async function loadDashboard() {
        const loading = document.getElementById('loading');
        try {
            const response = await fetch(SCRIPT_URL);
            globalData = await response.json();
            loading.style.display = 'none';

            categories = [...new Set(globalData.map(p => p.cat))];
            
            if(categories.length > 0) {
                buildTelemetryBar();
                selectCategory(0);
            }
        } catch (e) { loading.innerHTML = "❌ CRITICAL_COSMIC_DISRUPTION"; }
    }

    function buildTelemetryBar() {
        const bar = document.getElementById('telemetry-bar');
        bar.innerHTML = '';

        categories.forEach((cat, index) => {
            const sampleItem = globalData.find(p => p.cat === cat);
            const iconClass = sampleItem ? sampleItem.icon : 'fa-folder';
            const sectorHUD = `SEC_0${index + 1}`;

            const node = document.createElement('div');
            node.className = 'holo-node';
            node.id = `node-${index}`;
            node.innerHTML = `
                <div class="node-meta">
                    <span>${sectorHUD}</span>
                    <span>ACTIVE</span>
                </div>
                <i class="fas ${iconClass}"></i>
                <span>${cat}</span>
                <div class="laser-line"></div>
            `;
            
            node.onclick = () => { selectCategory(index); };
            bar.appendChild(node);
        });
    }

    function selectCategory(index) {
        activeIndex = index;
        
        categories.forEach((_, idx) => {
            const el = document.getElementById(`node-${idx}`);
            if(el) {
                if(idx === index) el.classList.add('node-active');
                else el.classList.remove('node-active');
            }
        });

        const activeCat = categories[activeIndex];
        const cardsView = document.getElementById('cards-view');
        cardsView.style.opacity = '0.1'; // Parpadeo electromagnético
        
        setTimeout(() => {
            cardsView.innerHTML = '';
            const filtered = globalData.filter(p => p.cat === activeCat);
            
            filtered.forEach(page => {
                const card = document.createElement('div');
                card.className = 'holo-card';
                card.innerHTML = `
                    <div class="card-actions">
                        <button class="action-btn" onclick="event.stopPropagation(); deletePage('${page.name}')">
                            <i class="fas fa-atom"></i>
                        </button>
                    </div>
                    <a href="${page.url}" target="_blank">
                        <i class="fas ${page.icon} main-icon"></i><br>
                        <span>${page.name}</span>
                    </a>
                `;
                cardsView.appendChild(card);
            });
            cardsView.style.opacity = '1';
        }, 100);
    }

    /* --- ENLACE A EXCEL SPREADSHEET --- */
    async function saveToExcel() {
        const name = document.getElementById('siteName').value;
        let url = document.getElementById('siteUrl').value;
        const cat = document.getElementById('siteCat').value;
        const icon = document.getElementById('siteIcon').value;
        const btn = document.getElementById('btnSave');

        if (name && url && cat) {
            if (!url.startsWith('http')) url = 'https://' + url;
            btn.disabled = true;
            btn.innerHTML = "SINC_MEM_COREING...";
            const finalUrl = `${SCRIPT_URL}?name=${encodeURIComponent(name)}&url=${encodeURIComponent(url)}&cat=${encodeURIComponent(cat)}&icon=${encodeURIComponent(icon)}`;
            await fetch(finalUrl, { mode: 'no-cors' });
            alert("🚀 Enlace integrado a la red intergaláctica.");
            location.reload();
        } else {
            alert("SYS_FAIL: Datos insuficientes.");
        }
    }

    async function deletePage(name) {
        if (confirm(`¿Desintegrar el nodo "${name}" de los registros?`)) {
            await fetch(`${SCRIPT_URL}?action=delete&name=${encodeURIComponent(name)}`, { mode: 'no-cors' });
            location.reload();
        }
    }

    function toggleModal() {
        const m = document.getElementById('adminModal');
        m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
    }

    window.onload = loadDashboard;
</script>
</body>
</html>
