<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOM | Gestión Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass: linear-gradient(135deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
            --glass-card: linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.01));
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-glow: rgba(0, 210, 255, 0.4);
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --bg-dark: #020617;
            --text-muted: #64748b;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            background: radial-gradient(circle at 50% 0%, #0b1329 0%, var(--bg-dark) 80%); 
            font-family: 'Poppins', sans-serif; 
            color: #f8fafc; 
            min-height: 100vh; 
            padding-bottom: 120px;
            overflow-x: hidden;
        }

        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 20px 16px; 
        }

        /* Header */
        .header-card { 
            background: var(--glass-card); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); 
            border-radius: 24px; 
            padding: 16px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 25px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05); 
        }
        
        .profile { display: flex; align-items: center; gap: 14px; }

        .avatar-ring { 
            width: 58px; height: 58px; border-radius: 50%; padding: 2px; 
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); 
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }
        
        .avatar-box { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; background: #000; cursor: pointer; }
        #avatar-video { width: 100%; height: 100%; object-fit: cover; }
        
        .title-box h1 { 
            font-family: 'Orbitron', sans-serif; font-size: 1.05rem; font-weight: 800; letter-spacing: 1px;
            background: linear-gradient(to right, #fff, #cbd5e1, var(--neon-blue)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }
        
        .title-box p { font-size: 0.55rem; color: var(--neon-blue); font-family: 'Orbitron'; font-weight: 600; letter-spacing: 2px; margin-top: 1px; opacity: 0.8;}

        /* --- DIAL CIRCULAR ESPACIAL (VIAJE EN EL TIEMPO) --- */
        .dial-container {
            position: relative;
            width: 100%;
            height: 180px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            touch-action: pan-y;
            user-select: none;
        }

        /* Anillos decorativos de interfaz cuántica */
        .quantum-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px dashed rgba(0, 210, 255, 0.15);
            pointer-events: none;
        }
        .ring-1 { width: 290px; height: 290px; animation: spin 40s linear infinite; }
        .ring-2 { width: 330px; height: 330px; border: 1px double rgba(157, 80, 187, 0.1); animation: spin 60s linear infinite reverse; }

        .dial-wheel {
            position: absolute;
            width: 300px;
            height: 300px;
            top: 50px; /* Desplazado hacia abajo para simular una esfera gigante semioculta */
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.03);
            box-shadow: inset 0 0 30px rgba(0, 210, 255, 0.05), 0 0 30px rgba(0, 0, 0, 0.6);
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.1, 0.8, 0.2, 1);
            cursor: grab;
        }
        .dial-wheel:active { cursor: grabbing; }

        .dial-item {
            position: absolute;
            top: 20px;
            left: 100px;
            width: 100px;
            height: 100px;
            transform-origin: center 130px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            backface-visibility: hidden;
            transition: opacity 0.3s, transform 0.3s;
            opacity: 0.3;
        }

        .dial-item.center-active {
            opacity: 1;
            transform: scale(1.15);
        }

        .dial-icon-box {
            width: 46px;
            height: 46px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #94a3b8;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            transition: all 0.3s;
        }

        .dial-item.center-active .dial-icon-box {
            color: var(--neon-blue);
            border-color: var(--neon-blue);
            background: rgba(0, 210, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4), inset 0 0 8px rgba(0, 210, 255, 0.2);
        }

        .dial-item span {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            color: #64748b;
            margin-top: 8px;
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            letter-spacing: 0.5px;
            transition: color 0.3s;
        }

        .dial-item.center-active span {
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255,255,255,0.3);
        }

        /* Indicador Holográfico Superior */
        .dial-indicator {
            position: absolute;
            top: -5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }
        .dial-indicator i { font-size: 0.7rem; color: var(--neon-blue); animation: blink 1s infinite alternate; }
        .dial-indicator .current-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: #fff;
            margin-top: 4px;
            text-shadow: 0 0 10px var(--neon-blue);
            background: rgba(2, 6, 23, 0.6);
            padding: 2px 12px;
            border-radius: 10px;
            border: 1px solid rgba(0, 210, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        /* --- REJILLA DE ENLACES (CONTENIDO FILTRADO) --- */
        .category-content-view {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            transition: opacity 0.3s ease;
        }

        .link-card { 
            background: rgba(255, 255, 255, 0.02); 
            border-radius: 18px; 
            padding: 20px 14px; 
            text-align: center; 
            position: relative; 
            border: 1px solid var(--glass-border); 
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        
        .link-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--glass-border-glow);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.1);
        }
        
        .link-card:active { transform: scale(0.97); }
        .link-card a { text-decoration: none; color: white; display: block; }
        
        .link-card i.main-icon { 
            font-size: 1.6rem; margin-bottom: 10px; color: var(--neon-blue); 
            transition: transform 0.3s;
        }
        .link-card:hover i.main-icon { transform: scale(1.08); text-shadow: 0 0 12px rgba(0, 210, 255, 0.5); }
        
        .link-card span { 
            font-size: 0.78rem; color: #e2e8f0; display: block; line-height: 1.3;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        /* Acciones Tarjeta */
        .card-actions { position: absolute; top: 6px; right: 6px; display: flex; opacity: 0; transition: opacity 0.2s; z-index: 5;}
        .link-card:hover .card-actions { opacity: 1; }
        .action-btn { 
            background: rgba(15, 23, 42, 0.9); border: 1px solid var(--glass-border); 
            color: #94a3b8; width: 26px; height: 26px; border-radius: 8px; cursor: pointer; 
            font-size: 0.7rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .btn-del:hover { background: #ef4444; color: white; border-color: #ef4444; }

        /* Floating Button & Modal */
        .fab { 
            position: fixed; bottom: 30px; right: 30px; width: 56px; height: 56px; 
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            border: none; color: white; font-size: 1.3rem; cursor: pointer; z-index: 1000; 
            box-shadow: 0 10px 25px rgba(0,210,255,0.3); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .fab:hover { transform: scale(1.08) rotate(90deg); box-shadow: 0 12px 30px rgba(0,210,255,0.45); }

        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.85); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 2000; 
            justify-content: center; align-items: center; padding: 20px; 
        }
        .modal-content { 
            background: #080d1a; width: 100%; max-width: 400px; padding: 30px; border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 25px 50px rgba(0,0,0,0.6); 
        }
        
        input, select { 
            width: 100%; padding: 14px; margin-bottom: 12px; background: #111726; 
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; color: white; 
            font-family: 'Poppins'; font-size: 0.85rem; outline: none; transition: all 0.3s;
        }
        input:focus, select:focus { border-color: var(--neon-blue); background: #151d30; box-shadow: 0 0 12px rgba(0, 210, 255, 0.1); }
        select option { background: #111726; color: #fff; }

        .save-btn { 
            background: linear-gradient(90deg, var(--neon-blue), #00b4db); color: #020617; 
            font-weight: 700; border: none; padding: 15px; border-radius: 12px; width: 100%; 
            cursor: pointer; font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 1px; transition: all 0.3s;
        }
        .save-btn:hover { box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3); }

        /* Animaciones */
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes blink { from { opacity: 0.3; } to { opacity: 1; } }
        @keyframes pulse { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.05); opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <header class="header-card">
        <div class="profile">
            <div class="avatar-ring">
                <div class="avatar-box" onmouseenter="playAvatarSound()" onmouseleave="stopAvatarSound()">
                    <video id="avatar-video" loop muted playsinline autoplay>
                        <source src="avatar.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
            <div class="title-box">
                <h1>GOM SCIENTIFIC</h1>
                <p>TIMELINE SYSTEM CONNECTED</p>
            </div>
        </div>
        <i class="fas fa-satellite-dish" style="color: var(--neon-blue); font-size: 0.9rem; animation: pulse 1.5s infinite alternate;"></i>
    </header>

    <div class="dial-container" id="dial-zone">
        <div class="quantum-ring ring-1"></div>
        <div class="quantum-ring ring-2"></div>
        
        <div class="dial-indicator">
            <i class="fas fa-caret-down"></i>
            <div class="current-title" id="active-cat-label">---</div>
        </div>

        <div class="dial-wheel" id="wheel">
            </div>
    </div>

    <div id="loading" style="text-align: center; padding: 20px; color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.7rem; letter-spacing: 1px;">
        <i class="fas fa-sync fa-spin"></i> ESCANEANDO MATRIZ DE EXCEL...
    </div>
    
    <div class="category-content-view" id="cards-view"></div>
</div>

<button class="fab" onclick="toggleModal()"><i class="fas fa-plus"></i></button>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <h2 style="font-family:'Orbitron'; font-size:0.9rem; font-weight:700; text-align:center; margin-bottom:20px; color:var(--neon-blue);">NUEVO RECURSO INTERDIMENSIONAL</h2>
        <input type="text" id="siteName" placeholder="Nombre del sitio">
        <input type="text" id="siteUrl" placeholder="URL (ej: www.google.com)">
        <input type="text" id="siteCat" placeholder="Categoría (ej: MIPES, Salud...)">
        
        <select id="siteIcon">
            <option value="fa-users">👥 Grupos</option>
            <option value="fa-child">🧒 Niño</option>
            <option value="fa-heart-pulse">❤️ Salud</option>
            <option value="fa-church">⛪ Iglesia</option>
            <option value="fa-microscope">🔬 Investigación</option>
            <option value="fa-seedling">🌱 Desarrollo Infantil</option>
            <option value="fa-brain">🧠 Inteligencia Artificial</option>
            <option value="fa-video">🎥 Videos</option>
            <option value="fa-flask-vial">🧪 Laboratorio</option>
            <option value="fa-database">📊 Gestión de Datos</option>
            <option value="fa-briefcase-medical">🏥 Gestión Pública</option>
            <option value="fa-book-open-reader">📚 Biblioteca Digital</option>
            <option value="fa-car">🚗 Mantenimiento Vehicular</option>
            <option value="fa-globe">🌐 Recurso Web</option>
            <option value="fa-shield-halved">🛡️ Seguridad</option>
            <option value="fa-file-lines">📄 Documentos</option>
            <option value="fa-calendar-check">📅 Agenda</option>
            <option value="fa-laptop-code">💻 Desarrollo Web</option>
            <option value="fa-chart-pie">📈 Estadísticas</option>
        </select>

        <button id="btnSave" class="save-btn" onclick="saveToExcel()">SINCRONIZAR AHORA</button>
        <button onclick="toggleModal()" style="background:transparent; color:var(--text-muted); width:100%; margin-top:12px; border:none; cursor:pointer; font-size:0.7rem;">CERRAR ARCHIVO</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwdIVWOn-VY6mhSrpIA7SolVLZ-1CjaRAWM8rkWsjOsmiDt1I6b8n6u0slz4bz7wdYcKg/exec";
    const video = document.getElementById('avatar-video');
    
    // Almacén global de datos de la API
    let globalData = [];
    let categories = [];
    let currentAngle = 0;
    let activeIndex = 0;

    function playAvatarSound() { video.muted = false; video.currentTime = 0; video.play().catch(e => {}); }
    function stopAvatarSound() { video.muted = true; }

    async function loadDashboard() {
        const loading = document.getElementById('loading');
        try {
            const response = await fetch(SCRIPT_URL);
            globalData = await response.json();
            loading.style.display = 'none';

            // Obtener categorías únicas
            categories = [...new Set(globalData.map(p => p.cat))];
            
            if(categories.length > 0) {
                buildWheel();
                updateSelection();
            }
        } catch (e) { loading.innerHTML = "❌ ERROR DE CONEXIÓN CUÁNTICA"; }
    }

    // Construcción tridimensional y angular del Dial Circular
    function buildWheel() {
        const wheel = document.getElementById('wheel');
        wheel.innerHTML = '';
        
        const angleStep = 360 / categories.length;

        categories.forEach((cat, index) => {
            // Buscamos un icono representativo de los elementos de esta categoría para el menú circular
            const sampleItem = globalData.find(p => p.cat === cat);
            const iconClass = sampleItem ? sampleItem.icon : 'fa-folder';

            const item = document.createElement('div');
            item.className = 'dial-item';
            // Cada item se desfasa angularmente y se empuja hacia afuera en el plano del círculo
            item.style.transform = `rotate(${index * angleStep}deg)`;
            item.setAttribute('data-index', index);
            
            item.innerHTML = `
                <div class="dial-icon-box">
                    <i class="fas ${iconClass}"></i>
                </div>
                <span>${cat}</span>
            `;
            
            // Permitir clics directos sobre el icono para mover la rueda automáticamente
            item.onclick = () => {
                rotateToCategory(index);
            };

            wheel.appendChild(item);
        });
    }

    // Centra y rota la rueda a un índice específico
    function rotateToCategory(index) {
        const angleStep = 360 / categories.length;
        activeIndex = index;
        currentAngle = -index * angleStep;
        
        const wheel = document.getElementById('wheel');
        wheel.style.transform = `rotate(${currentAngle}deg)`;
        
        updateSelection();
    }

    // Actualiza los estados visuales del texto central superior e inyecta las tarjetas filtradas
    function updateSelection() {
        const items = document.querySelectorAll('.dial-item');
        items.forEach(item => {
            if (parseInt(item.getAttribute('data-index')) === activeIndex) {
                item.classList.add('center-active');
            } else {
                item.classList.remove('center-active');
            }
        });

        const activeCat = categories[activeIndex];
        document.getElementById('active-cat-label').innerText = activeCat.toUpperCase();

        // Renderizar las tarjetas correspondientes a la categoría con efecto electromagnético sutil
        const cardsView = document.getElementById('cards-view');
        cardsView.style.opacity = '0';
        
        setTimeout(() => {
            cardsView.innerHTML = '';
            const filtered = globalData.filter(p => p.cat === activeCat);
            
            filtered.forEach(page => {
                const card = document.createElement('div');
                card.className = 'link-card';
                card.innerHTML = `
                    <div class="card-actions">
                        <button class="action-btn btn-del" onclick="event.stopPropagation(); deletePage('${page.name}')">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                    <a href="${page.url}" target="_blank">
                        <i class="fas ${page.icon} main-icon"></i><br>
                        <span>${page.name}</span>
                    </a>
                `;
                cardsView.appendChild(card);
            });
            cardsView.style.opacity = '1';
        }, 150);
    }

    /* --- LÓGICA DE CONTROL GESTUAL (TOUCH MÓVIL Y RATÓN PC) --- */
    const dialZone = document.getElementById('dial-zone');
    let isDragging = false;
    let startX = 0;
    let baseAngle = 0;

    // Manejador del inicio del arrastre
    function dragStart(e) {
        isDragging = true;
        startX = e.touches ? e.touches[0].clientX : e.clientX;
        baseAngle = currentAngle;
        document.getElementById('wheel').style.transition = 'none'; // Desactivar transición mientras arrastras
    }

    // Manejador del movimiento
    function dragMove(e) {
        if (!isDragging) return;
        const currentX = e.touches ? e.touches[0].clientX : e.clientX;
        const diffX = currentX - startX;
        
        // Convertimos el arrastre lineal en grados de rotación (sensibilidad ajustable)
        const sensitivity = 0.4; 
        const deltaAngle = diffX * sensitivity;
        
        const wheel = document.getElementById('wheel');
        wheel.style.transform = `rotate(${baseAngle + deltaAngle}deg)`;
        currentAngle = baseAngle + deltaAngle;
    }

    // Manejador del fin del arrastre con cálculo de aproximación (Snap-to-item)
    function dragEnd() {
        if (!isDragging) return;
        isDragging = false;
        
        const wheel = document.getElementById('wheel');
        wheel.style.transition = 'transform 0.4s cubic-bezier(0.1, 0.8, 0.2, 1)';

        const angleStep = 360 / categories.length;
        
        // Calcular cuál es la categoría más cercana en base al ángulo final detenido
        let estimatedIndex = Math.round(-currentAngle / angleStep) % categories.length;
        if (estimatedIndex < 0) estimatedIndex += categories.length;
        
        rotateToCategory(estimatedIndex);
    }

    // Registro de eventos para PC y Móviles
    dialZone.addEventListener('mousedown', dragStart);
    window.addEventListener('mousemove', dragMove);
    window.addEventListener('mouseup', dragEnd);

    dialZone.addEventListener('touchstart', dragStart, { passive: true });
    window.addEventListener('touchmove', dragMove, { passive: false });
    window.addEventListener('touchend', dragEnd);


    /* --- OPERACIONES API REST EXCEL --- */
    async function saveToExcel() {
        const name = document.getElementById('siteName').value;
        let url = document.getElementById('siteUrl').value;
        const cat = document.getElementById('siteCat').value;
        const icon = document.getElementById('siteIcon').value;
        const btn = document.getElementById('btnSave');

        if (name && url && cat) {
            if (!url.startsWith('http')) url = 'https://' + url;
            btn.disabled = true;
            btn.innerHTML = "PROCESANDO MATRIZ...";
            const finalUrl = `${SCRIPT_URL}?name=${encodeURIComponent(name)}&url=${encodeURIComponent(url)}&cat=${encodeURIComponent(cat)}&icon=${encodeURIComponent(icon)}`;
            await fetch(finalUrl, { mode: 'no-cors' });
            alert("✅ Línea temporal actualizada en la Nube.");
            location.reload();
        } else {
            alert("Completa todos los campos obligatorios.");
        }
    }

    async function deletePage(name) {
        if (confirm(`¿Purgar permanentemente "${name}" del registro?`)) {
            await fetch(`${SCRIPT_URL}?action=delete&name=${encodeURIComponent(name)}`, { mode: 'no-cors' });
            location.reload();
        }
    }

    function toggleModal() {
        const m = document.getElementById('adminModal');
        m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
    }

    window.onload = loadDashboard;
</script>
</body>
</html>
