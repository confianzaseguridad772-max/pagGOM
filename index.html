<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOM | Interstellar Bridge</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Share+Tech+Mono&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-space: #02040a;
            --hud-cyan: #00f0ff;
            --hud-orange: #ff6c00;
            --hud-magenta: #ff0055;
            --hud-green: #00ff66;
            --panel-alpha: rgba(5, 12, 22, 0.85);
            --panel-border: rgba(0, 240, 255, 0.2);
            --font-hud: 'Share Tech Mono', monospace;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            background: 
                linear-gradient(rgba(18, 32, 47, 0.05) 50%, rgba(0, 0, 0, 0.25) 50%),
                radial-gradient(circle at 50% 0%, #071324 0%, var(--bg-space) 80%);
            background-size: 100% 4px, 100% 100%;
            font-family: 'Poppins', sans-serif; 
            color: #c8d6e5; 
            min-height: 100vh; 
            padding-bottom: 140px;
            overflow-x: hidden;
        }

        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 16px; 
        }

        /* --- HUD COMMANDER HEADER --- */
        .header-card { 
            background: var(--panel-alpha); 
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--panel-border);
            border-top: 4px solid var(--hud-cyan);
            padding: 14px 18px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 20px; 
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 0 0 15px rgba(0, 240, 255, 0.05);
        }
        
        /* Detalles de calibración visual del astronauta */
        .header-card::before { content: '[ MAIN BRIDGE ]'; position: absolute; bottom: -18px; left: 0; font-family: var(--font-hud); font-size: 0.55rem; color: var(--hud-cyan); letter-spacing: 1px; opacity: 0.7; }
        .header-card::after { content: 'SYS_VER_4.1.0'; position: absolute; bottom: -18px; right: 0; font-family: var(--font-hud); font-size: 0.55rem; color: var(--hud-orange); letter-spacing: 1px; opacity: 0.7; }

        .profile { display: flex; align-items: center; gap: 14px; }

        .avatar-ring { 
            width: 56px; height: 56px; border-radius: 4px; padding: 2px; 
            background: var(--hud-cyan);
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% 80%, 80% 100%, 0 100%);
        }
        
        .avatar-box { width: 100%; height: 100%; overflow: hidden; background: #000; cursor: pointer; clip-path: polygon(0 0, 100% 0, 100% 80%, 78% 100%, 0 100%); }
        #avatar-video { width: 100%; height: 100%; object-fit: cover; filter: hue-rotate(10deg) brightness(1.1); }
        
        .title-box h1 { 
            font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 900; letter-spacing: 2px;
            color: #fff; text-shadow: 0 0 12px rgba(0, 240, 255, 0.5);
        }
        
        .title-box p { 
            font-size: 0.6rem; color: var(--hud-green); font-family: var(--font-hud); letter-spacing: 2px; margin-top: 1px;
            display: flex; align-items: center; gap: 6px;
        }
        .title-box p::before { content: ''; width: 5px; height: 5px; background: var(--hud-green); border-radius: 50%; display: inline-block; animation: beacon 1s infinite alternate; box-shadow: 0 0 8px var(--hud-green); }

        /* --- HORIZONTAL TELEMETRY MAPPING (SELECTOR DE NAVE) --- */
        .system-telemetry {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 4px 15px 4px;
            margin-bottom: 20px;
            scrollbar-width: none; /* Ocultar barra en Firefox */
        }
        .system-telemetry::-webkit-scrollbar { display: none; } /* Ocultar barra en Chrome/Safari */

        .telemetry-node {
            flex: 0 0 130px;
            background: rgba(10, 20, 35, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 3px solid #334155;
            padding: 12px 10px;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            transition: all 0.25s ease;
        }

        .telemetry-node .node-grid {
            font-family: var(--font-hud);
            font-size: 0.55rem;
            color: #475569;
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .telemetry-node i {
            font-size: 1.1rem;
            color: #64748b;
            margin-bottom: 8px;
            display: block;
            transition: color 0.3s;
        }

        .telemetry-node span {
            font-family: var(--font-hud);
            font-size: 0.7rem;
            font-weight: bold;
            color: #94a3b8;
            display: block;
            text-transform: uppercase;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Barra de energía decorativa interna */
        .telemetry-node .power-bar {
            width: 100%; height: 2px; background: rgba(255,255,255,0.05); margin-top: 8px; position: relative; overflow: hidden;
        }
        .telemetry-node .power-bar::after { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 30%; background: #475569; transition: all 0.3s; }

        /* NODO ACTIVO (SELECCIONADO POR EL ASTRONAUTA) */
        .telemetry-node.node-active {
            background: rgba(0, 240, 255, 0.05);
            border-color: var(--hud-cyan);
            border-bottom-color: var(--hud-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15), inset 0 0 10px rgba(0, 240, 255, 0.1);
        }
        .telemetry-node.node-active .node-grid { color: var(--hud-cyan); }
        .telemetry-node.node-active i { color: var(--hud-cyan); text-shadow: 0 0 10px var(--hud-cyan); }
        .telemetry-node.node-active span { color: #fff; }
        .telemetry-node.node-active .power-bar::after { width: 100%; background: var(--hud-cyan); box-shadow: 0 0 8px var(--hud-cyan); animation: core-pulse 1.5s infinite alternate; }

        /* Variación de colores en nodos activos para mayor dinamismo visual */
        .telemetry-node.node-active:nth-child(2n) { border-color: var(--hud-orange); border-bottom-color: var(--hud-orange); box-shadow: 0 0 15px rgba(255,108,0,0.15); }
        .telemetry-node.node-active:nth-child(2n) .node-grid { color: var(--hud-orange); }
        .telemetry-node.node-active:nth-child(2n) i { color: var(--hud-orange); text-shadow: 0 0 10px var(--hud-orange); }
        .telemetry-node.node-active:nth-child(2n) .power-bar::after { background: var(--hud-orange); box-shadow: 0 0 8px var(--hud-orange); }

        .telemetry-node.node-active:nth-child(3n) { border-color: var(--hud-magenta); border-bottom-color: var(--hud-magenta); box-shadow: 0 0 15px rgba(255,0,85,0.15); }
        .telemetry-node.node-active:nth-child(3n) .node-grid { color: var(--hud-magenta); }
        .telemetry-node.node-active:nth-child(3n) i { color: var(--hud-magenta); text-shadow: 0 0 10px var(--hud-magenta); }
        .telemetry-node.node-active:nth-child(3n) .power-bar::after { background: var(--hud-magenta); box-shadow: 0 0 8px var(--hud-magenta); }

        /* --- CONSOLA DE REJILLA EN VIVO (TARJETAS DE COMANDO) --- */
        .category-content-view {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            transition: opacity 0.25s ease;
        }

        .link-card { 
            background: rgba(6, 12, 24, 0.8);
            border: 1px solid rgba(0, 240, 255, 0.12);
            padding: 20px 12px; 
            text-align: center; 
            position: relative; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: all 0.2s cubic-bezier(0.1, 0.8, 0.2, 1);
            clip-path: polygon(0 0, 88% 0, 100% 16%, 100% 100%, 0 100%); /* Esquina biselada */
        }
        
        /* Punto LED superior de enlace de datos estables */
        .link-card::before {
            content: ''; position: absolute; top: 6px; left: 6px; width: 4px; height: 4px; 
            background: var(--hud-green); border-radius: 50%; box-shadow: 0 0 6px var(--hud-green);
        }
        
        .link-card:hover {
            background: rgba(14, 28, 51, 0.9);
            border-color: var(--hud-cyan);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2), inset 0 0 8px rgba(0, 240, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .link-card:active { transform: scale(0.97); }
        .link-card a { text-decoration: none; color: white; display: block; }
        
        .link-card i.main-icon { 
            font-size: 1.5rem; margin-bottom: 10px; color: #a4b6cc;
            transition: all 0.3s;
        }
        .link-card:hover i.main-icon { transform: scale(1.08); color: var(--hud-cyan); text-shadow: 0 0 12px var(--hud-cyan); }
        
        .link-card span { 
            font-family: var(--font-hud); font-size: 0.85rem; font-weight: bold; color: #7e91a6; display: block; 
            letter-spacing: 0.5px; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .link-card:hover span { color: #fff; }

        /* Botón de Purga del Módulo (Eyección de emergencia) */
        .card-actions { position: absolute; bottom: 6px; right: 6px; opacity: 0; transition: opacity 0.2s; z-index: 5;}
        .link-card:hover .card-actions { opacity: 1; }
        .action-btn { 
            background: rgba(255, 0, 85, 0.1); border: 1px solid var(--hud-magenta); 
            color: var(--hud-magenta); width: 22px; height: 22px; border-radius: 2px; cursor: pointer; 
            font-size: 0.6rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .action-btn:hover { background: var(--hud-magenta); color: white; box-shadow: 0 0 8px var(--hud-magenta); }

        /* --- BOTÓN FLOTANTE HUD INYECTOR (FAB) --- */
        .fab { 
            position: fixed; bottom: 35px; right: 35px; width: 55px; height: 55px; 
            background: #040812; border: 2px dashed var(--hud-cyan);
            border-radius: 4px; display: flex; align-items: center; justify-content: center; 
            color: var(--hud-cyan); font-size: 1.2rem; cursor: pointer; z-index: 1000; 
            box-shadow: 0 0 20px rgba(0,240,255,0.3); 
            transition: all 0.3s;
            clip-path: polygon(20% 0%, 100% 0%, 100% 80%, 80% 100%, 0% 100%, 0% 20%);
        }
        .fab:hover { 
            background: var(--hud-cyan); color: #000; border-style: solid;
            box-shadow: 0 0 25px var(--hud-cyan); transform: scale(1.05);
        }

        /* --- MODAL TELEMETRÍA DE DATOS --- */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(2, 4, 8, 0.95); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); z-index: 2000; 
            justify-content: center; align-items: center; padding: 20px; 
        }
        .modal-content { 
            background: #060c16; width: 100%; max-width: 400px; padding: 26px; border-radius: 4px; 
            border: 1px solid var(--hud-orange); box-shadow: 0 0 30px rgba(255, 108, 0, 0.25); 
            position: relative;
        }
        
        input, select { 
            width: 100%; padding: 12px; margin-bottom: 12px; background: #0c1424; 
            border: 1px solid rgba(0, 240, 255, 0.15); border-radius: 2px; color: white; 
            font-family: var(--font-hud); font-size: 0.9rem; outline: none; transition: all 0.3s;
        }
        input:focus, select:focus { border-color: var(--hud-orange); background: #111c33; box-shadow: 0 0 10px rgba(255, 108, 0, 0.15); }
        select option { background: #060c16; color: #fff; }

        .save-btn { 
            background: var(--hud-orange); color: #000; 
            font-weight: 900; border: none; padding: 14px; border-radius: 2px; width: 100%; 
            cursor: pointer; font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 1px; transition: all 0.3s;
            box-shadow: 0 0 15px rgba(255, 108, 0, 0.2);
        }
        .save-btn:hover { filter: brightness(1.1); box-shadow: 0 0 25px var(--hud-orange); }

        /* Animaciones de Cabina */
        @keyframes beacon { from { opacity: 0.3; } to { opacity: 1; } }
        @keyframes core-pulse { from { opacity: 0.6; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <header class="header-card">
        <div class="profile">
            <div class="avatar-ring">
                <div class="avatar-box" onmouseenter="playAvatarSound()" onmouseleave="stopAvatarSound()">
                    <video id="avatar-video" loop muted playsinline autoplay>
                        <source src="avatar.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
            <div class="title-box">
                <h1>GOM MISSION</h1>
                <p>ORBIT_TELEMETRY_LINKED</p>
            </div>
        </div>
        <i class="fas fa-satellite-dish" style="color: var(--hud-cyan); font-size: 1rem; text-shadow: 0 0 8px var(--hud-cyan); animation: beacon 1s infinite alternate;"></i>
    </header>

    <div class="system-telemetry" id="telemetry-bar">
        </div>

    <div id="loading" style="text-align: center; padding: 30px; color: var(--hud-cyan); font-family: var(--font-hud); font-size: 0.75rem; letter-spacing: 2px;">
        <i class="fas fa-compress-alt fa-spin" style="margin-right: 6px;"></i> CARGANDO PARÁMETROS DEL SISTEMA...
    </div>
    
    <div class="category-content-view" id="cards-view"></div>
</div>

<button class="fab" onclick="toggleModal()"><i class="fas fa-network-wired"></i></button>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <h2 style="font-family:'Orbitron'; font-size:0.9rem; font-weight:900; letter-spacing:1px; text-align:center; margin-bottom:20px; color:var(--hud-orange);">INYECTAR NODO DE COMUNICACIÓN</h2>
        <input type="text" id="siteName" placeholder="NODO ID (NOMBRE)">
        <input type="text" id="siteUrl" placeholder="VECTOR URL (DIRECCIÓN)">
        <input type="text" id="siteCat" placeholder="MATRIZ PADRE (CATEGORÍA)">
        
        <select id="siteIcon">
            <option value="fa-users">👥 Grupos</option>
            <option value="fa-child">🧒 Niño</option>
            <option value="fa-heart-pulse">❤️ Salud</option>
            <option value="fa-church">⛪ Iglesia</option>
            <option value="fa-microscope">🔬 Investigación</option>
            <option value="fa-seedling">🌱 Desarrollo Infantil</option>
            <option value="fa-brain">🧠 Inteligencia Artificial</option>
            <option value="fa-video">🎥 Videos</option>
            <option value="fa-flask-vial">🧪 Laboratorio</option>
            <option value="fa-database">📊 Gestión de Datos</option>
            <option value="fa-briefcase-medical">🏥 Gestión Pública</option>
            <option value="fa-book-open-reader">📚 Biblioteca Digital</option>
            <option value="fa-car">🚗 Mantenimiento Vehicular</option>
            <option value="fa-globe">🌐 Recurso Web</option>
            <option value="fa-shield-halved">🛡️ Seguridad</option>
            <option value="fa-file-lines">📄 Documentos</option>
            <option value="fa-calendar-check">📅 Agenda</option>
            <option value="fa-laptop-code">💻 Desarrollo Web</option>
            <option value="fa-chart-pie">📈 Estadísticas</option>
        </select>

        <button id="btnSave" class="save-btn" onclick="saveToExcel()">SINC_NODE_NOW</button>
        <button onclick="toggleModal()" style="background:transparent; color:#64748b; width:100%; margin-top:14px; border:none; cursor:pointer; font-family: var(--font-hud); font-size:0.75rem;">ABORTAR</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwdIVWOn-VY6mhSrpIA7SolVLZ-1CjaRAWM8rkWsjOsmiDt1I6b8n6u0slz4bz7wdYcKg/exec";
    const video = document.getElementById('avatar-video');
    
    let globalData = [];
    let categories = [];
    let activeIndex = 0;

    function playAvatarSound() { video.muted = false; video.currentTime = 0; video.play().catch(e => {}); }
    function stopAvatarSound() { video.muted = true; }

    async function loadDashboard() {
        const loading = document.getElementById('loading');
        try {
            const response = await fetch(SCRIPT_URL);
            globalData = await response.json();
            loading.style.display = 'none';

            categories = [...new Set(globalData.map(p => p.cat))];
            
            if(categories.length > 0) {
                buildTelemetryBar();
                selectCategory(0);
            }
        } catch (e) { loading.innerHTML = "❌ CRITICAL_CONNECTION_ERROR"; }
    }

    // Construcción del Selector Horizontal de Instrumentos de Astronauta
    function buildTelemetryBar() {
        const bar = document.getElementById('telemetry-bar');
        bar.innerHTML = '';

        categories.forEach((cat, index) => {
            const sampleItem = globalData.find(p => p.cat === cat);
            const iconClass = sampleItem ? sampleItem.icon : 'fa-folder';
            
            // Generador de índices ficticios estéticos estilo HUD de aviación (ej: CH-01, CH-02...)
            const indexHUD = (index + 1) < 10 ? `CH-0${index + 1}` : `CH-${index + 1}`;

            const node = document.createElement('div');
            node.className = 'telemetry-node';
            node.id = `node-${index}`;
            node.innerHTML = `
                <div class="node-grid">
                    <span>${indexHUD}</span>
                    <span>ONLINE</span>
                </div>
                <i class="fas ${iconClass}"></i>
                <span>${cat}</span>
                <div class="power-bar"></div>
            `;
            
            node.onclick = () => { selectCategory(index); };
            bar.appendChild(node);
        });
    }

    // Activa el nodo del astronauta y despliega los submódulos (tarjetas)
    function selectCategory(index) {
        activeIndex = index;
        
        // Actualizar estados visuales de los nodos horizontales
        categories.forEach((_, idx) => {
            const el = document.getElementById(`node-${idx}`);
            if(el) {
                if(idx === index) el.classList.add('node-active');
                else el.classList.remove('node-active');
            }
        });

        const activeCat = categories[activeIndex];
        const cardsView = document.getElementById('cards-view');
        cardsView.style.opacity = '0.1'; // Parpadeo electromagnético al renderizar
        
        setTimeout(() => {
            cardsView.innerHTML = '';
            const filtered = globalData.filter(p => p.cat === activeCat);
            
            filtered.forEach(page => {
                const card = document.createElement('div');
                card.className = 'link-card';
                card.innerHTML = `
                    <div class="card-actions">
                        <button class="action-btn" onclick="event.stopPropagation(); deletePage('${page.name}')">
                            <i class="fas fa-radiation"></i>
                        </button>
                    </div>
                    <a href="${page.url}" target="_blank">
                        <i class="fas ${page.icon} main-icon"></i><br>
                        <span>${page.name}</span>
                    </a>
                `;
                cardsView.appendChild(card);
            });
            cardsView.style.opacity = '1';
        }, 120);
    }

    /* --- OPERACIONES CON EXCEL CLOUD --- */
    async function saveToExcel() {
        const name = document.getElementById('siteName').value;
        let url = document.getElementById('siteUrl').value;
        const cat = document.getElementById('siteCat').value;
        const icon = document.getElementById('siteIcon').value;
        const btn = document.getElementById('btnSave');

        if (name && url && cat) {
            if (!url.startsWith('http')) url = 'https://' + url;
            btn.disabled = true;
            btn.innerHTML = "UPLOADING_MATRIX...";
            const finalUrl = `${SCRIPT_URL}?name=${encodeURIComponent(name)}&url=${encodeURIComponent(url)}&cat=${encodeURIComponent(cat)}&icon=${encodeURIComponent(icon)}`;
            await fetch(finalUrl, { mode: 'no-cors' });
            alert("🚀 Vector de datos inyectado con éxito.");
            location.reload();
        } else {
            alert("SYS_ERROR: Datos incompletos.");
        }
    }

    async function deletePage(name) {
        if (confirm(`¿Destruir el enlace operativo "${name}"?`)) {
            await fetch(`${SCRIPT_URL}?action=delete&name=${encodeURIComponent(name)}`, { mode: 'no-cors' });
            location.reload();
        }
    }

    function toggleModal() {
        const m = document.getElementById('adminModal');
        m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
    }

    window.onload = loadDashboard;
</script>
</body>
</html>
