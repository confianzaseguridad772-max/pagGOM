<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOM | Interstellar Command HUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --space-black: #050811;
            --hull-gray: #0f1524;
            --nasa-cyan: #00f0ff;
            --orange-alert: #ff5500;
            --telemetry-green: #00ff66;
            --grid-line: rgba(0, 240, 255, 0.04);
            --font-mono: 'Share Tech Mono', monospace;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            background-color: var(--space-black);
            /* Retícula vectorial de panel de astronauta */
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 25px 25px;
            font-family: 'Poppins', sans-serif; 
            color: #f1f5f9; 
            min-height: 100vh; 
            padding-bottom: 140px;
            overflow-x: hidden;
        }

        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 20px 16px; 
        }

        /* --- MÓDULO SUPERIOR: TELEMETRÍA DE MISIÓN --- */
        .header-card { 
            background: rgba(15, 21, 36, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(0, 240, 255, 0.2);
            border-radius: 12px; 
            padding: 16px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 30px; 
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            /* Esquinas reforzadas de aviación */
            clip-path: polygon(0 0, 95% 0, 100% 15%, 100% 100%, 5% 100%, 0 85%);
        }

        .profile { display: flex; align-items: center; gap: 16px; }

        .avatar-ring { 
            width: 56px; height: 56px; border-radius: 50%; padding: 2px; 
            background: linear-gradient(135deg, var(--nasa-cyan), var(--orange-alert)); 
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }
        
        .avatar-box { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; background: #000; cursor: pointer; }
        #avatar-video { width: 100%; height: 100%; object-fit: cover; filter: grayscale(20%) sepia(10%) contrast(110%); }
        
        .title-box h1 { 
            font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 900; letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
        }
        
        .title-box p { 
            font-size: 0.65rem; color: var(--telemetry-green); font-family: var(--font-mono); letter-spacing: 1.5px; margin-top: 1px;
            display: flex; align-items: center; gap: 6px;
        }
        .title-box p::before { content: ''; width: 5px; height: 5px; background: var(--telemetry-green); border-radius: 50%; display: inline-block; animation: beacon 1s infinite alternate; box-shadow: 0 0 8px var(--telemetry-green); }

        /* --- MANDOS ROTATORIOS DE NAVEGACIÓN DE ÓRBITA --- */
        .dial-container {
            position: relative;
            width: 100%;
            height: 230px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1500px;
            touch-action: pan-y;
            user-select: none;
        }

        /* Líneas de calibración angular y horizontes artificiales */
        .quantum-ring {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            top: 60px;
        }
        .ring-1 { 
            width: 310px; height: 310px; 
            border: 1px dashed rgba(255, 255, 255, 0.08); 
            border-top: 2px solid var(--nasa-cyan);
            border-bottom: 2px solid var(--nasa-cyan);
            animation: spin 45s linear infinite; 
        }
        .ring-2 { 
            width: 350px; height: 350px; 
            border: 1px solid rgba(0, 240, 255, 0.05); 
            border-left: 2px solid rgba(255, 85, 0, 0.3);
            animation: spin 25s linear infinite reverse; 
        }

        .dial-wheel {
            position: absolute;
            width: 330px;
            height: 330px;
            top: 75px;
            border-radius: 50%;
            background: rgba(10, 16, 30, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.9), 0 15px 35px rgba(0,0,0,0.7);
            transform-style: preserve-3d;
            transition: transform 0.55s cubic-bezier(0.1, 0.8, 0.2, 1);
            cursor: grab;
        }
        .dial-wheel:active { cursor: grabbing; }

        .dial-item {
            position: absolute;
            top: 15px;
            left: 115px;
            width: 100px;
            height: 100px;
            transform-origin: center 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backface-visibility: hidden;
            transition: all 0.3s ease;
            opacity: 0.3;
        }

        .dial-item.center-active {
            opacity: 1;
            transform: scale(1.15);
        }

        /* selectores tipo botones duros de cabina */
        .dial-icon-box {
            width: 48px;
            height: 48px;
            background: #131b2e;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            color: #94a3b8;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.05);
            transition: all 0.3s;
        }

        .dial-item.center-active .dial-icon-box {
            color: #fff;
            background: #020617;
            border-color: var(--nasa-cyan);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3), inset 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .dial-item span {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            font-weight: bold;
            color: #64748b;
            margin-top: 8px;
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .dial-item.center-active span {
            color: var(--nasa-cyan);
        }

        /* Visor Central Superior del Astronauta (HUD Target) */
        .dial-indicator {
            position: absolute;
            top: -5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }
        .dial-indicator i { font-size: 0.65rem; color: var(--orange-alert); margin-bottom: 2px; }
        .dial-indicator .current-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #fff;
            background: #0a0f1d;
            padding: 4px 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-top: 2px solid var(--orange-alert);
        }

        /* --- CONSOLAS DE SUBMÓDULO (TARJETAS DE ENLACE) --- */
        .category-content-view {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            transition: opacity 0.2s;
        }

        .link-card { 
            background: rgba(15, 21, 36, 0.8); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 3px solid #475569; /* Estado inactivo */
            border-radius: 6px;
            padding: 20px 12px; 
            text-align: center; 
            position: relative; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: all 0.25s ease;
            overflow: hidden;
        }
        
        /* Pequeña lectura de estado simulación instrumental */
        .link-card::before {
            content: 'SYS_OK'; position: absolute; top: 4px; left: 6px; 
            font-family: var(--font-mono); font-size: 0.5rem; color: var(--telemetry-green); opacity: 0.6;
        }

        .link-card:hover {
            background: #141d30;
            border-color: rgba(0, 240, 255, 0.3);
            border-top-color: var(--nasa-cyan);
            transform: translateY(-2px);
        }
        
        .link-card:active { transform: scale(0.98); }
        .link-card a { text-decoration: none; color: white; display: block; }
        
        .link-card i.main-icon { 
            font-size: 1.5rem; margin-bottom: 10px; color: #cbd5e1;
            transition: all 0.2s;
        }
        .link-card:hover i.main-icon { color: var(--nasa-cyan); text-shadow: 0 0 10px rgba(0, 240, 255, 0.4); }
        
        .link-card span { 
            font-family: var(--font-mono); font-size: 0.8rem; font-weight: bold; color: #94a3b8; display: block; 
            letter-spacing: 0.5px; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .link-card:hover span { color: #fff; }

        /* Botón de Eyección de Registro (Eliminar) */
        .card-actions { position: absolute; top: 4px; right: 6px; opacity: 0; transition: opacity 0.2s; z-index: 5;}
        .link-card:hover .card-actions { opacity: 1; }
        .action-btn { 
            background: transparent; border: 1px solid rgba(255, 85, 0, 0.4); 
            color: var(--orange-alert); width: 22px; height: 22px; border-radius: 4px; cursor: pointer; 
            font-size: 0.6rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .action-btn:hover { background: var(--orange-alert); color: white; box-shadow: 0 0 8px var(--orange-alert); }

        /* --- BOTÓN DE ENTRADA ALFA (FAB) --- */
        .fab { 
            position: fixed; bottom: 35px; right: 35px; width: 56px; height: 56px; 
            background: var(--hull-gray); border: 2px solid var(--orange-alert);
            border-radius: 8px; display: flex; align-items: center; justify-content: center; 
            color: var(--orange-alert); font-size: 1.2rem; cursor: pointer; z-index: 1000; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.5); 
            transition: all 0.3s;
        }
        .fab:hover { 
            background: var(--orange-alert); color: #fff;
            box-shadow: 0 0 15px var(--orange-alert); transform: scale(1.05);
        }

        /* --- PANEL MODAL INTERSTELAR --- */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(5, 8, 17, 0.92); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 2000; 
            justify-content: center; align-items: center; padding: 20px; 
        }
        .modal-content { 
            background: var(--hull-gray); width: 100%; max-width: 390px; padding: 26px; border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.15); border-top: 4px solid var(--nasa-cyan);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); 
        }
        
        input, select { 
            width: 100%; padding: 12px; margin-bottom: 12px; background: #070b14; 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 4px; color: white; 
            font-family: var(--font-mono); font-size: 0.85rem; outline: none; transition: all 0.2s;
        }
        input:focus, select:focus { border-color: var(--nasa-cyan); box-shadow: 0 0 8px rgba(0, 240, 255, 0.2); }
        select option { background: var(--hull-gray); color: #fff; }

        .save-btn { 
            background: #00f0ff; color: #050811; 
            font-weight: 700; border: none; padding: 14px; border-radius: 4px; width: 100%; 
            cursor: pointer; font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 1px; transition: all 0.2s;
        }
        .save-btn:hover { background: #00d2e0; box-shadow: 0 0 12px rgba(0, 240, 255, 0.3); }

        /* Animaciones */
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes beacon { from { opacity: 0.3; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <header class="header-card">
        <div class="profile">
            <div class="avatar-ring">
                <div class="avatar-box" onmouseenter="playAvatarSound()" onmouseleave="stopAvatarSound()">
                    <video id="avatar-video" loop muted playsinline autoplay>
                        <source src="avatar.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
            <div class="title-box">
                <h1>GOM SCIENTIFIC</h1>
                <p>TELEMETRY_LINK_ESTABLISHED</p>
            </div>
        </div>
        <i class="fas fa-satellite-dish" style="color: var(--nasa-cyan); font-size: 1rem; animation: beacon 1.2s infinite alternate;"></i>
    </header>

    <div class="dial-container" id="dial-zone">
        <div class="quantum-ring ring-1"></div>
        <div class="quantum-ring ring-2"></div>
        
        <div class="dial-indicator">
            <i class="fas fa-triangle"></i>
            <div class="current-title" id="active-cat-label">LOADING...</div>
        </div>

        <div class="dial-wheel" id="wheel"></div>
    </div>

    <div id="loading" style="text-align: center; padding: 25px; color: var(--orange-alert); font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 1px;">
        <i class="fas fa-spinner fa-pulse" style="margin-right: 6px;"></i> ESCANEANDO MATRIZ DE BASE DE DATOS...
    </div>
    
    <div class="category-content-view" id="cards-view"></div>
</div>

<button class="fab" onclick="toggleModal()"><i class="fas fa-network-wired"></i></button>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <h2 style="font-family:'Orbitron'; header:3px; font-size:0.9rem; font-weight:700; text-align:center; margin-bottom:18px; color:var(--nasa-cyan);">CONFIGURAR NUEVO VECTOR</h2>
        <input type="text" id="siteName" placeholder="IDENTIFICADOR REGISTRO">
        <input type="text" id="siteUrl" placeholder="DIRECCIÓN ENLACE (URL)">
        <input type="text" id="siteCat" placeholder="MÓDULO DE ASIGNACIÓN (CAT)">
        
        <select id="siteIcon">
            <option value="fa-users">👥 Grupos</option>
            <option value="fa-child">🧒 Niño</option>
            <option value="fa-heart-pulse">❤️ Salud</option>
            <option value="fa-church">⛪ Iglesia</option>
            <option value="fa-microscope">🔬 Investigación</option>
            <option value="fa-seedling">🌱 Desarrollo Infantil</option>
            <option value="fa-brain">🧠 Inteligencia Artificial</option>
            <option value="fa-video">🎥 Videos</option>
            <option value="fa-flask-vial">🧪 Laboratorio</option>
            <option value="fa-database">📊 Gestión de Datos</option>
            <option value="fa-briefcase-medical">🏥 Gestión Pública</option>
            <option value="fa-book-open-reader">📚 Biblioteca Digital</option>
            <option value="fa-car">🚗 Mantenimiento Vehicular</option>
            <option value="fa-globe">🌐 Recurso Web</option>
            <option value="fa-shield-halved">🛡️ Seguridad</option>
            <option value="fa-file-lines">📄 Documentos</option>
            <option value="fa-calendar-check">📅 Agenda</option>
            <option value="fa-laptop-code">💻 Desarrollo Web</option>
            <option value="fa-chart-pie">📈 Estadísticas</option>
        </select>

        <button id="btnSave" class="save-btn" onclick="saveToExcel()">SINCRONIZAR SENSOR</button>
        <button onclick="toggleModal()" style="background:transparent; color:#64748b; width:100%; margin-top:14px; border:none; cursor:pointer; font-family: var(--font-mono); font-size:0.7rem; letter-spacing: 0.5px;">CANCELAR ENTRADA</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwdIVWOn-VY6mhSrpIA7SolVLZ-1CjaRAWM8rkWsjOsmiDt1I6b8n6u0slz4bz7wdYcKg/exec";
    const video = document.getElementById('avatar-video');
    
    let globalData = [];
    let categories = [];
    let currentAngle = 0;
    let activeIndex = 0;

    function playAvatarSound() { video.muted = false; video.currentTime = 0; video.play().catch(e => {}); }
    function stopAvatarSound() { video.muted = true; }

    async function loadDashboard() {
        const loading = document.getElementById('loading');
        try {
            const response = await fetch(SCRIPT_URL);
            globalData = await response.json();
            loading.style.display = 'none';

            categories = [...new Set(globalData.map(p => p.cat))];
            
            if(categories.length > 0) {
                buildWheel();
                rotateToCategory(0);
            }
        } catch (e) { loading.innerHTML = "❌ ENLACE SATELITAL CAÍDO"; }
    }

    function buildWheel() {
        const wheel = document.getElementById('wheel');
        wheel.innerHTML = '';
        const angleStep = 360 / categories.length;

        categories.forEach((cat, index) => {
            const sampleItem = globalData.find(p => p.cat === cat);
            const iconClass = sampleItem ? sampleItem.icon : 'fa-folder';

            const item = document.createElement('div');
            item.className = 'dial-item';
            item.style.transform = `rotate(${index * angleStep}deg)`;
            item.setAttribute('data-index', index);
            
            item.innerHTML = `
                <div class="dial-icon-box">
                    <i class="fas ${iconClass}"></i>
                </div>
                <span>${cat}</span>
            `;
            
            item.onclick = () => { rotateToCategory(index); };
            wheel.appendChild(item);
        });
    }

    function rotateToCategory(index) {
        const angleStep = 360 / categories.length;
        activeIndex = index;
        currentAngle = -index * angleStep;
        
        const wheel = document.getElementById('wheel');
        wheel.style.transform = `rotate(${currentAngle}deg)`;
        
        updateSelection();
    }

    function updateSelection() {
        const items = document.querySelectorAll('.dial-item');
        items.forEach(item => {
            if (parseInt(item.getAttribute('data-index')) === activeIndex) {
                item.classList.add('center-active');
            } else {
                item.classList.remove('center-active');
            }
        });

        const activeCat = categories[activeIndex];
        if(activeCat) {
            document.getElementById('active-cat-label').innerText = activeCat.toUpperCase();
        }

        const cardsView = document.getElementById('cards-view');
        cardsView.style.opacity = '0.3';
        
        setTimeout(() => {
            cardsView.innerHTML = '';
            const filtered = globalData.filter(p => p.cat === activeCat);
            
            filtered.forEach(page => {
                const card = document.createElement('div');
                card.className = 'link-card';
                card.innerHTML = `
                    <div class="card-actions">
                        <button class="action-btn" onclick="event.stopPropagation(); deletePage('${page.name}')">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <a href="${page.url}" target="_blank">
                        <i class="fas ${page.icon} main-icon"></i><br>
                        <span>${page.name}</span>
                    </a>
                `;
                cardsView.appendChild(card);
            });
            cardsView.style.opacity = '1';
        }, 100);
    }

    /* --- COCKPIT INTERACTIVE GESTURES (MÓVIL / PC) --- */
    const dialZone = document.getElementById('dial-zone');
    let isDragging = false;
    let startX = 0;
    let baseAngle = 0;

    function dragStart(e) {
        isDragging = true;
        startX = e.touches ? e.touches[0].clientX : e.clientX;
        baseAngle = currentAngle;
        document.getElementById('wheel').style.transition = 'none';
    }

    function dragMove(e) {
        if (!isDragging) return;
        const currentX = e.touches ? e.touches[0].clientX : e.clientX;
        const diffX = currentX - startX;
        const deltaAngle = diffX * 0.35; 
        
        currentAngle = baseAngle + deltaAngle;
        document.getElementById('wheel').style.transform = `rotate(${currentAngle}deg)`;
    }

    function dragEnd() {
        if (!isDragging) return;
        isDragging = false;
        
        const wheel = document.getElementById('wheel');
        wheel.style.transition = 'transform 0.4s cubic-bezier(0.1, 0.8, 0.2, 1)';

        const angleStep = 360 / categories.length;
        let estimatedIndex = Math.round(-currentAngle / angleStep) % categories.length;
        if (estimatedIndex < 0) estimatedIndex += categories.length;
        
        rotateToCategory(estimatedIndex);
    }

    dialZone.addEventListener('mousedown', dragStart);
    window.addEventListener('mousemove', dragMove);
    window.addEventListener('mouseup', dragEnd);

    dialZone.addEventListener('touchstart', dragStart, { passive: true });
    window.addEventListener('touchmove', dragMove, { passive: false });
    window.addEventListener('touchend', dragEnd);

    /* --- ENLACES EXCELS TERMINAL --- */
    async function saveToExcel() {
        const name = document.getElementById('siteName').value;
        let url = document.getElementById('siteUrl').value;
        const cat = document.getElementById('siteCat').value;
        const icon = document.getElementById('siteIcon').value;
        const btn = document.getElementById('btnSave');

        if (name && url && cat) {
            if (!url.startsWith('http')) url = 'https://' + url;
            btn.disabled = true;
            btn.innerHTML = "SINC_MATRIZ...";
            const finalUrl = `${SCRIPT_URL}?name=${encodeURIComponent(name)}&url=${encodeURIComponent(url)}&cat=${encodeURIComponent(cat)}&icon=${encodeURIComponent(icon)}`;
            await fetch(finalUrl, { mode: 'no-cors' });
            alert("🚀 Registro de telemetría guardado.");
            location.reload();
        } else {
            alert("Campos incompletos.");
        }
    }

    async function deletePage(name) {
        if (confirm(`¿Purgar subsegmento "${name}"?`)) {
            await fetch(`${SCRIPT_URL}?action=delete&name=${encodeURIComponent(name)}`, { mode: 'no-cors' });
            location.reload();
        }
    }

    function toggleModal() {
        const m = document.getElementById('adminModal');
        m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
    }

    window.onload = loadDashboard;
</script>
</body>
</html>
